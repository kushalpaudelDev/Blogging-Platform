{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="container" style="max-width: 600px; margin: 64px auto; text-align: center; background: #fff; padding: 48px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
  <h1 style="color: #dc2626; margin-top: 0;">Delete Post</h1>
  <p style="font-size: 18px; margin: 24px 0 40px;">Are you sure you want to delete the post <strong>"{{ post.title }}"</strong>? This action cannot be undone.</p>
  
  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn" style="background: #dc2626; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 16px; cursor: pointer;">Yes, Delete</button>
    <a href="{% url 'post_detail' post.pk %}" style="display: inline-block; margin-left: 16px; color: #4b5563; text-decoration: none; padding: 12px 24px; border-radius: 4px; background: #f3f4f6;">Cancel</a>
  </form>
</div>
{% endblock %}
