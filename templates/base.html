{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Inkwell{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
  <nav class="navbar">
    <div class="container" style="display:flex; justify-content:space-between; padding: 16px 0;">
      <a href="{% url 'post_list' %}" style="font-weight:bold; font-size: 24px; text-decoration:none;">Inkwell</a>
      <div>
        {% if user.is_authenticated %}
          <a href="{% url 'profile' %}" style="margin-right: 16px;">Profile</a>
          <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none; border:none; cursor:pointer; font-size:16px;">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" style="margin-right: 16px;">Login</a>
          <a href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  {% if messages %}
    <div class="container messages">
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }}" style="padding: 12px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px;">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main>
    {% block content %}
    {% endblock %}
  </main>
</body>
</html>
